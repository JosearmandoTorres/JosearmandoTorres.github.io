<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Josearmando Torres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Contact page: full-viewport split ── */
    .contact-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - var(--nav-h));
    }

    /* ── Left: content ── */
    .contact-left {
      padding: 5rem 5rem 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .contact-heading {
      font-family: 'Cormorant Garamond', serif;
      font-size: 3.6rem;
      font-weight: 300;
      line-height: 1.0;
      letter-spacing: -0.02em;
      margin-bottom: 1.8rem;
    }

    .contact-heading em {
      display: block;
      font-style: italic;
      color: var(--accent);
    }

    .contact-intro {
      color: var(--subtle);
      font-size: 1rem;
      font-weight: 300;
      line-height: 1.75;
      max-width: 40ch;
      margin-bottom: 3rem;
    }

    .contact-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.1rem 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: color 0.18s;
      max-width: 420px;
    }

    .contact-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .contact-item:hover { color: var(--accent); }

    .contact-platform {
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.18s;
    }

    .contact-item:hover .contact-platform { color: var(--accent); }

    .contact-handle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      font-weight: 400;
    }

    /* ── Right: photo ── */
    .contact-right {
      position: relative;
      overflow: hidden;
    }

    .contact-right img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 30%;
      display: block;
      filter: saturate(0.85);
    }

    /* ── Mobile ── */
    @media (max-width: 820px) {
      .contact-page {
        grid-template-columns: 1fr;
        height: auto;
      }

      .contact-left {
        padding: 3.5rem 2rem 3rem;
        justify-content: flex-start;
      }

      .contact-heading { font-size: 2.8rem; }

      .contact-item { max-width: 100%; }

      .contact-right {
        height: 55vw;
        min-height: 260px;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <a href="index.html" class="site-title">Josearmando <em>Torres</em></a>
    <nav class="site-nav">
      <a href="index.html">About</a>
      <a href="research.html">Research</a>
      <a href="files/CVJosearmandoTorres.pdf" target="_blank" class="cv-link">CV</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <div class="contact-page">

    <div class="contact-left fade-in">
      <h1 class="contact-heading">Get in<em>touch.</em></h1>
      <p class="contact-intro">
        I'm always open to conversations about research, data,
        or anything Latino politics.
      </p>
      <div class="contact-links">
        <a href="mailto:josearmando@ucla.edu" class="contact-item">
          <span class="contact-platform">Email</span>
          <span class="contact-handle">josearmando@ucla.edu</span>
        </a>
        <a href="https://github.com/JosearmandoTorres" target="_blank" class="contact-item">
          <span class="contact-platform">GitHub</span>
          <span class="contact-handle">JosearmandoTorres</span>
        </a>
        <a href="https://x.com/JosearmandoT_" target="_blank" class="contact-item">
          <span class="contact-platform">Twitter / X</span>
          <span class="contact-handle">@JosearmandoT_</span>
        </a>
        <a href="https://www.linkedin.com/in/josearmando-torres/" target="_blank" class="contact-item">
          <span class="contact-platform">LinkedIn</span>
          <span class="contact-handle">Josearmando Torres</span>
        </a>
      </div>
    </div>

    <div class="contact-right">
      <img src="images/river.jpg" alt="" loading="lazy" />
      <div class="photo-caption-overlay">El Olote, Durango, México</div>
    </div>

  </div>

  <script>
    document.querySelectorAll('.fade-in').forEach(el => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.05 });
      obs.observe(el);
    });
  </script>

</body>
</html>
