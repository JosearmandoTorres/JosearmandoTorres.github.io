<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Josearmando Torres</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* ── Contact page: full-viewport split ── */
    .contact-page {
      display: grid;
      grid-template-columns: 1fr 1fr;
      height: calc(100vh - var(--nav-h));
    }

    /* ── Left: content ── */
    .contact-left {
      padding: 2rem 3rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }

    .contact-text-wrap {
      width: 100%;
      max-width: 500px;
    }

    .contact-intro {
      color: var(--subtle);
      font-size: 1.12rem;
      font-weight: 300;
      line-height: 1.75;
      max-width: 40ch;
      margin-bottom: 3rem;
    }

    .contact-item {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      padding: 1.1rem 0;
      border-top: 1px solid var(--border);
      text-decoration: none;
      color: var(--text);
      transition: color 0.18s;
      max-width: 500px;
    }

    .contact-item:last-child {
      border-bottom: 1px solid var(--border);
    }

    .contact-item:hover { color: var(--accent); }

    .contact-platform {
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.13em;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.18s;
    }

    .contact-item:hover .contact-platform { color: var(--accent); }

    .contact-handle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.2rem;
      font-weight: 400;
    }

    /* ── Right: photo ── */
    .contact-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 3.5rem 3rem;
    }

    .contact-right img {
      width: 92%;
      height: auto;
      display: block;
      filter: saturate(0.85);
    }

    .contact-right .photo-caption {
      width: 92%;
      margin-top: 0.6rem;
    }

    /* ── Mobile ── */
    @media (max-width: 820px) {
      .contact-page {
        grid-template-columns: 1fr;
        height: auto;
      }

      .contact-left {
        padding: 3rem 2rem 2.5rem;
        align-items: flex-start;
      }

      .contact-text-wrap { max-width: 100%; }

      .contact-item { max-width: 100%; }

      .contact-right {
        padding: 2rem 2rem 3rem;
        align-items: flex-start;
      }

      .contact-right img,
      .contact-right .photo-caption {
        width: 100%;
      }
    }
  </style>
</head>

<body>

  <header class="site-header">
    <a href="index.html" class="site-title">Josearmando <em>Torres</em></a>
    <nav class="site-nav">
      <a href="index.html">About</a>
      <a href="research.html">Research</a>
      <a href="files/CVJosearmandoTorres.pdf" target="_blank" class="cv-link">CV</a>
      <a href="projects.html">Projects</a>
      <a href="contact.html" class="active">Contact</a>
    </nav>
  </header>

  <div class="contact-page">

    <div class="contact-left fade-in">
      <div class="contact-text-wrap">
      <div class="section-label" style="margin-bottom: 1.8rem;">Contact</div>
      <p class="contact-intro">
        I'm always open to conversations about research, data,
        or anything Latino politics.
      </p>
      <div class="contact-links">
        <a href="mailto:josearmando@ucla.edu" class="contact-item">
          <span class="contact-platform">Email</span>
          <span class="contact-handle">josearmando@ucla.edu</span>
        </a>
        <a href="https://github.com/JosearmandoTorres" target="_blank" class="contact-item">
          <span class="contact-platform">GitHub</span>
          <span class="contact-handle">JosearmandoTorres</span>
        </a>
        <a href="https://x.com/JosearmandoT_" target="_blank" class="contact-item">
          <span class="contact-platform">Twitter / X</span>
          <span class="contact-handle">@JosearmandoT_</span>
        </a>
        <a href="https://www.linkedin.com/in/josearmando-torres/" target="_blank" class="contact-item">
          <span class="contact-platform">LinkedIn</span>
          <span class="contact-handle">Josearmando Torres</span>
        </a>
      </div>
      </div><!-- /.contact-text-wrap -->
    </div>

    <div class="contact-right">
      <img src="images/river.jpg" alt="" loading="lazy" />
      <div class="photo-caption">El Olote, Durango, México</div>
    </div>

  </div>

  <script>
    document.querySelectorAll('.fade-in').forEach(el => {
      const obs = new IntersectionObserver(entries => {
        entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); } });
      }, { threshold: 0.05 });
      obs.observe(el);
    });
  </script>

</body>
</html>
